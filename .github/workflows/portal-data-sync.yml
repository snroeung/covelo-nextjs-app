name: Portal Data Sync

on:
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC (off-hour, low traffic)
  workflow_dispatch:
    inputs:
      source_key:
        description: "Source key to re-run (default: all)"
        required: false
        default: "all"

concurrency:
  group: portal-data-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Fetch, extract, upsert pending portal data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SOURCE_KEY_FILTER: ${{ github.event.inputs.source_key || 'all' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run sync
        run: npx tsx scripts/portal-sync/run.ts 2>&1 | tee portal-sync.log
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-sync-log-${{ github.run_id }}
          path: portal-sync.log
          retention-days: 14
